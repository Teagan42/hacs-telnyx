name: Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip commits made by the bot itself
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version in manifest.json
        id: bump
        run: |
          python - <<'PYEOF'
          import json, sys

          manifest_path = "custom_components/telnyx/manifest.json"
          with open(manifest_path) as f:
              manifest = json.load(f)

          major, minor, patch = manifest["version"].split(".")
          manifest["version"] = f"{major}.{minor}.{int(patch) + 1}"

          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(manifest["version"], end="")
          PYEOF

          NEW_VERSION=$(python -c "import json; print(json.load(open('custom_components/telnyx/manifest.json'))['version'])")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/telnyx/manifest.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"
